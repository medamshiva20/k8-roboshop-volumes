apiVersion: v1
kind: PersistentVolumeClaim
metadata:
 name: mongodb
 namespace: roboshop
spec:
 storageClassName: ""
 accessModes: 
  - ReadWriteOnce
 resources:
  requests:
   storage: 1Gi
---
apiVersion: v1
kind: Service
metadata:
 name: mongodb-headless
 namespace: roboshop
 labels:
  project: roboshop
  component: db
  environment: dev
spec:
 clusterIP: None
 selector:
  project: roboshop
  component: db
  environment: dev
 ports:
  - protocol: TCP
    port: 27017
    targetPort: 27017
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
 name: mongodb
 namespace: roboshop 
 labels:
  project: roboshop
  component: db
  environment: dev
spec:
 replicas: 3
 selector:
  matchLabels:
   project: roboshop
   component: db
   environment: dev
 template:
  metadata:
   labels:
    project: roboshop
    component: db
    environment: dev
  spec:
   - name: mongodb
     image: sivamedam/mongodb:1.0.0
---
apiVersion: v1
kind: Service
metadata:
 name: mongodb
 namespace: roboshop
 labels:
  project: roboshop
  component: db
  environment: dev
spec:
 selector:
  project: roboshop
  component: db
  environment: dev
 ports:
  - protocol: TCP
    port: 27017
    targetPort: 27017