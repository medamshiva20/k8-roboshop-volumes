apiVersion: v1
kind: ConfigMap
metadata:
 name: catalogue
 namespace: roboshop
 labels:
  project: roboshop
  tier: backend
  component: catalogue
data:
 MONGO: "true"
 MONGO_URL: "mongodb://mongodb:27017/catalogue"
---
apiVersion: apps/v1
kind: Deployment
metadata:
 name: catalogue
 namespace: roboshop
 labels:
  project: roboshop
  tier: backend
  component: catalogue
spec:
 replicas: 1
 selector:
  matchLabels:
   project: roboshop
   tier: backend
   component: catalogue
 template:
  metadata:
   labels:
    project: roboshop
    tier: backend
    component: catalogue
  spec:
   containers:
    - name: catalogue
      image: sivamedam/catalogue:1.4.0
      imagePullPolicy: Always
      resources:
       requests:
        cpu: "100m"
        memory: "64Mi"
       limits:
        cpu: "200m"
        memory: "128Mi"
      readinessProbe:
       tcpSocket:
        port: 8080
       failureThreshold: 2
       periodSeconds: 10
       initialDelaySeconds: 15
      livenessProbe:
       httpGet:
        path: /health
        port: 8080
       failureThreshold: 2
       periodSeconds: 10  
      envFrom:
       - configMapRef:
          name: catalogue
---
apiVersion: v1
kind: Service
metadata:
 name: catalogue
 namespace: roboshop
 labels:
  project: roboshop
  tier: backend
  component: catalogue
spec:
 type: ClusterIP
 selector:
  project: roboshop
  tier: backend
  component: catalogue
 ports:
  - protocol: TCP
    port: 8080
    targetPort: 8080

